apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.app.strategy.maxSurge }}
      maxUnavailable: {{ .Values.app.strategy.maxUnavailable }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
      annotations:
        # Forces a manual rollout if the configmap changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ .Release.Name }}
      containers:
        - name: {{ .Release.Name }}
          image: "{{ .Values.global.registry }}/{{ .Values.global.projectPath }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            privileged: false
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: {{ .Values.app.containerPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ .Values.app.image.livenessPath }}
              port: http
            initialDelaySeconds: 10
            timeoutSeconds: 1
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.app.image.readinessPath }}
              port: http
            initialDelaySeconds: 5
            timeoutSeconds: 1
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: {{ .Values.app.image.startupPath }}
              port: http
            failureThreshold: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: "{{ .Release.Name }}-configmap"
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep {{ .Values.app.preStopSleep }}"]
      volumes:
        - name: config-files-volume
          configMap:
            name: "{{ .Release.Name }}-config-files"
        - name: tmp-volume
          emptyDir: {}
      terminationGracePeriodSeconds: {{ .Values.app.terminationGracePeriodSeconds }}